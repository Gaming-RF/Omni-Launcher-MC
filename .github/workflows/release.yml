name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libgtk-3-dev libappindicator3-dev patchelf librsvg2-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and package
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OmniLauncherMC ${{ github.ref_name }}"
          releaseBody: |
            ## OmniLauncherMC ${{ github.ref_name }}

            Open-source Minecraft launcher unifying Modrinth, CurseForge, and custom modpacks.

            ### Downloads
            - **Windows**: `.msi` installer
            - **macOS**: `.dmg` (Apple Silicon & Intel)
            - **Linux**: `.deb`, `.rpm`, `.AppImage`

            ### Features
            - Browse and install mods from Modrinth and CurseForge
            - Import modpacks (.mrpack and CurseForge .zip)
            - Microsoft OAuth and offline mode
            - Auto Java download (Java 8, 16, 17, 21)
            - Per-instance mod management
            - Instance sharing via share codes
            - Game console with log streaming
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
